schema_version: 1

context:
  name: google-cloud-storage
  version: "3.12.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/google-cloud-storage/google_cloud_storage-${{ version }}.tar.gz
  sha256: 03ae9847c6babb368f35f054126b8a08cbc0e3266efb990eb17b9926a45cf3be

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --no-build-isolation

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-auth >=2.26.1,<3.0.0
    - google-api-core >=2.27.0,<3.0.0
    - google-cloud-core >=2.4.2,<3.0.0
    - google-resumable-media >=2.7.2,<3.0.0
    - requests >=2.22.0,<3.0.0
    - google-crc32c >=1.6.0,<2.0.0
    - protobuf >=3.20.2,<7.0.0

tests:
  - python:
      imports:
        - google
        - google.cloud
        - google.cloud.storage
      python_version:
        - ${{ python_min }}.*
        - "*"
      pip_check: true

about:
  summary: Python Client for Google Cloud Storage
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/google-cloud-python/blob/main/packages/google-cloud-storage
  repository: https://github.com/googleapis/google-cloud-python/blob/main/packages/google-cloud-storage
  documentation: https://docs.cloud.google.com/python/docs/reference/storage/latest

extra:
  recipe-maintainers:
    - xylar
    - andreyz4k
    - johanneskoester
    - tswast
